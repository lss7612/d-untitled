spring.application.name=momo

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:momo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME:momo}
spring.datasource.password=${DB_PASSWORD:momo}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# JPA
spring.jpa.open-in-view=false
spring.data.jpa.repositories.enabled=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/auth/google/callback

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000

# Mail (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Developer emails (콤마 구분, DEVELOPER 역할 부여 + 모든 동호회 ADMIN 자동 가입)
app.developer-emails=${DEVELOPER_EMAILS:sslee@kr.doubledown.com}

# Debug
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=TRACE
