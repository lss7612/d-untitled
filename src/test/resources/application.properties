spring.application.name=momo

# H2 (테스트용)
spring.datasource.url=jdbc:h2:mem:momo-test
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JPA
spring.jpa.open-in-view=false
spring.data.jpa.repositories.enabled=true

# Google OAuth2 (테스트용 더미)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/auth/google/callback

# JWT (테스트용)
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi1hdC1sZWFzdC0zMi1ieXRlcw==
jwt.expiration-ms=3600000

# Mail (테스트용 더미)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Frontend CORS
frontend.url=http://localhost:5173
